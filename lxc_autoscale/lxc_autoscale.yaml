# Default configuration values
DEFAULT:
  log_file: /var/log/lxc_autoscale.log
  lock_file: /var/lock/lxc_autoscale.lock
  backup_dir: /var/lib/lxc_autoscale/backups
  # Percentage of CPU cores to reserve (e.g., 10%)
  reserve_cpu_percent: 10
  # Amount of memory (in MB) to reserve (e.g., 2048 MB)
  reserve_memory_mb: 2048
  # Start hour for off-peak energy-saving mode (e.g., 10 PM)
  off_peak_start: 22
  # End hour for off-peak energy-saving mode (e.g., 6 AM)
  off_peak_end: 6
  # Behaviour mode (e.g., 'normal', 'conservative', 'aggressive')
  behaviour: normal
  # Default CPU upper threshold (%)
  cpu_upper_threshold: 80
  # Default CPU lower threshold (%)
  cpu_lower_threshold: 20
  # Default Memory upper threshold (%)
  memory_upper_threshold: 70
  # Default Memory lower threshold (%)
  memory_lower_threshold: 20
  # Default minimum number of CPU cores
  min_cores: 1
  # Default maximum number of CPU cores
  max_cores: 4
  # Default minimum memory (MB)
  min_memory: 256
  # Default core increment
  core_min_increment: 1
  # Default core max increment: 2
  core_max_increment: 2
  # Default memory increment (MB)
  memory_min_increment: 256
  # Default memory decrement (MB)
  min_decrease_chunk: 256
  ignore_lxc: 
    - "104"  # Update to string format for consistency
  
# Tier configurations
TIER_webservers:
  lxc_containers:
    - "102"  # Update to string format
  cpu_upper_threshold: 70
  cpu_lower_threshold: 20
  memory_upper_threshold: 80
  memory_lower_threshold: 20
  min_cores: 1
  max_cores: 4
  min_memory: 4096
  core_min_increment: 1
  core_max_increment: 2
  memory_min_increment: 1024
  min_decrease_chunk: 1024

TIER_other:
  lxc_containers:
    - "103"  # Update to string format
  cpu_upper_threshold: 60
  cpu_lower_threshold: 20
  memory_upper_threshold: 50
  memory_lower_threshold: 20
  min_cores: 1
  max_cores: 2
  min_memory: 256
  core_min_increment: 1
  core_max_increment: 1
  memory_min_increment: 128
  min_decrease_chunk: 64

# --- Backend selection (v2.0) ---
# Choose between CLI (default, uses pct commands) or REST API.
#
#   backend: cli             # Default — local or SSH-based pct commands
#   # backend: api           # Use Proxmox REST API (requires proxmoxer)
#
# --- Remote SSH execution ---
# Set use_remote_proxmox: true to run pct commands on a remote host via SSH.
#
#   use_remote_proxmox: true
#   proxmox_host: 192.168.1.1
#   ssh_user: root
#   ssh_password: ${SSH_PASSWORD}    # Supports ${ENV_VAR} expansion
#   # ssh_key_path: /root/.ssh/id_rsa  # Alternative to password
#   ssh_port: 22
#   ssh_host_key_policy: reject      # reject (safe) | system | auto (insecure)
#
# --- Timezone (v2.0) ---
# Used for off-peak scheduling. Defaults to UTC.
#
#   timezone: Europe/Rome
#
# --- Proxmox REST API backend (v2.0) ---
# Enable with backend: api. Requires: pip install proxmoxer
#
#   proxmox_api:
#     host: 192.168.1.1
#     user: root@pam
#     token_name: autoscale
#     token_value: ${PROXMOX_API_TOKEN}   # Use env var for security
#     verify_ssl: true
#
# --- Boost/Revert scaling mode (v2.0) ---
# Temporary boost with automatic revert. When a container is saturated
# for N consecutive polls, boost resources by a factor for a limited
# duration, then revert to original values automatically.
# Set per-container via tiers, or globally in DEFAULT.
#
#   scaling_mode: boost          # "threshold" (default) or "boost"
#   boost_factor: 1.5            # primary boost multiplier (+50%)
#   boost_fallback_factor: 1.25  # fallback if primary exceeds capacity (+25%)
#   boost_duration: 120          # seconds before auto-revert
#   saturation_threshold: 0.95   # usage fraction to trigger (0.0-1.0)
#   consecutive_samples: 3       # polls above threshold before boosting
#
# Example tier with boost mode:
#
# TIER_databases:
#   lxc_containers:
#     - "105"
#   scaling_mode: boost
#   boost_factor: 1.5
#   boost_duration: 300
#   saturation_threshold: 0.90
#   consecutive_samples: 2

# --- CPU core pinning for hybrid Intel CPUs (Big.LITTLE) ---
# Uncomment and adjust for your setup.
#
# TIER_performance:
#   lxc_containers:
#     - "105"
#   cpu_pinning: p-cores       # Pin to Performance cores
#   max_cores: 8
#   min_cores: 2
#   min_memory: 4096
#
# TIER_background:
#   lxc_containers:
#     - "106"
#     - "107"
#   cpu_pinning: e-cores       # Pin to Efficiency cores
#   max_cores: 4
#   min_cores: 1
#   min_memory: 512
#
# cpu_pinning accepts: "p-cores", "e-cores", "all", or an explicit
# range like "0-11" or "0,2,4,6-8".  Requires Intel Alder Lake+
# (12th gen or newer) for automatic P/E-core detection.